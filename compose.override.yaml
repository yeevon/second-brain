# Local development override. Docker Compose auto-loads this file alongside compose.yaml.
#
# This file provides sensible local defaults so that plain Docker lifecycle commands
# work without shell exports:
#
#   docker compose up -d
#   docker compose down
#   docker compose logs -f
#   docker compose ps
#
# Production deployments use deploy.sh, which sets COMPOSE_FILE=compose.yaml explicitly.
# When COMPOSE_FILE is set, Docker Compose does NOT auto-load this file.
#
# DO NOT use this file in EC2 / staging / production.

services:
  capture-service:
    # Create the EBS sentinel marker on first local container start so
    # docker compose up -d works without the manual docker run init step.
    entrypoint:
      - /bin/sh
      - -c
      - |
        touch /var/lib/second-brain/.second-brain-ebs-volume 2>/dev/null || true
        exec /usr/local/bin/secondbrain-entrypoint /app/.venv/bin/python -m secondbrain run
    volumes:
      - second-brain-local-data:/var/lib/second-brain

  n8n:
    image: docker.n8n.io/n8nio/n8n:${N8N_IMAGE_TAG:-2.25.7}
    container_name: second-brain-n8n
    restart: unless-stopped
    env_file:
      - ${N8N_ENV_FILE:-n8n.local.env}
    environment:
      N8N_ENCRYPTION_KEY_FILE: /run/secrets/n8n_encryption_key
    secrets:
      - n8n_encryption_key
    volumes:
      - second-brain-local-n8n-data:/home/node/.n8n
    ports:
      - "127.0.0.1:5678:5678"
    expose:
      - "5678"
    networks:
      - backend
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5678/').then(r => process.exit(r.status < 500 ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  writer-service:
    environment:
      WRITER_SERVICE_TOKEN: ${WRITER_SERVICE_TOKEN:-dev-writer-service-token-change-me}
      VAULT_PATH: /opt/vault
      AUDIT_LOG_PATH: /opt/vault/99_log/events.ndjson
      GIT_SYNC_ENABLED: ${GIT_SYNC_ENABLED:-false}
    volumes:
      - second-brain-local-vault:/opt/vault

secrets:
  n8n_encryption_key:
    file: ${N8N_ENCRYPTION_KEY_FILE:-n8n-encryption-key.local}

volumes:
  second-brain-local-data:
    name: second-brain-local-data
  second-brain-local-n8n-data:
    name: second-brain-local-n8n-data
  second-brain-local-vault:
    name: second-brain-local-vault
