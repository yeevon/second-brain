# Dev-only: Dockerized MCP service for clients that can launch Docker commands.
#
# This is NOT the recommended MCP setup. Prefer running brain-mcp as a host
# process so all AI clients (Claude, ChatGPT, Codex, Gemini) can reach it
# without Docker-specific client configuration.
#
# Preferred host setup (works with any MCP client):
#   uv sync
#   VAULT_PATH=/path/to/vault brain-mcp
#
# Claude Code / Claude Desktop MCP config:
#   {
#     "mcpServers": {
#       "second-brain": {
#         "command": "uv",
#         "args": ["run", "--project", "/path/to/second-brain", "brain-mcp"],
#         "env": {
#           "VAULT_PATH": "/path/to/my-vault",
#           "LEDGER_PATH": "/path/to/.runtime/ledger.sqlite3"
#         }
#       }
#     }
#   }
#
# Docker exec MCP config (this file):
#   docker compose -f compose.override.yaml -f compose.mcp-local.yaml --profile mcp up -d mcp-service
#   {
#     "mcpServers": {
#       "second-brain": {
#         "command": "docker",
#         "args": ["compose", "-f", "compose.override.yaml", "-f", "compose.mcp-local.yaml",
#                  "exec", "-T", "mcp-service", "/app/.venv/bin/brain-mcp"]
#       }
#     }
#   }

services:
  mcp-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: second-brain-capture-service:local
    container_name: second-brain-mcp-service
    command: ["sleep", "infinity"]
    environment:
      VAULT_PATH: /opt/vault
      LEDGER_PATH: /var/lib/second-brain/ledger.sqlite3
    volumes:
      - ${LOCAL_VAULT_PATH:-second-brain-local-vault}:/opt/vault:ro
      - second-brain-local-data:/var/lib/second-brain:ro
    restart: unless-stopped
    networks:
      - backend
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    profiles:
      - mcp
