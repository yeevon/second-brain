services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:${N8N_IMAGE_TAG:?N8N_IMAGE_TAG must be set}
    container_name: second-brain-n8n
    restart: unless-stopped
    env_file:
      - ${N8N_ENV_FILE:?N8N_ENV_FILE must be set}
    environment:
      N8N_ENCRYPTION_KEY_FILE: /run/secrets/n8n_encryption_key
    secrets:
      - n8n_encryption_key
    volumes:
      - ${N8N_DATA_SOURCE:?N8N_DATA_SOURCE must be set}:/home/node/.n8n
    ports:
      - "127.0.0.1:5678:5678"
    expose:
      - "5678"
    networks:
      - backend
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5678/').then(r => process.exit(r.status < 500 ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  writer-service:
    build:
      context: .
      dockerfile: writer-service/Dockerfile
    container_name: second-brain-writer-service
    restart: unless-stopped
    env_file:
      - ${WRITER_SERVICE_ENV_FILE:?WRITER_SERVICE_ENV_FILE must be set}
    environment:
      GIT_SSH_COMMAND: >-
        ssh -i /run/secrets/vault_deploy_key
        -o StrictHostKeyChecking=yes
        -o UserKnownHostsFile=/run/secrets/github_known_hosts
        -o BatchMode=yes
      GIT_AUTHOR_NAME: "Second Brain Writer"
      GIT_AUTHOR_EMAIL: "writer@second-brain.local"
      GIT_COMMITTER_NAME: "Second Brain Writer"
      GIT_COMMITTER_EMAIL: "writer@second-brain.local"
    secrets:
      - vault_deploy_key
      - github_known_hosts
    volumes:
      - ${WRITER_VAULT_SOURCE:?WRITER_VAULT_SOURCE must be set}:/opt/vault
    networks:
      - backend
    # Writer entrypoint creates a runtime user and copies Git SSH secrets before dropping privileges.
    # Do not drop all capabilities before entrypoint runs.
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

secrets:
  n8n_encryption_key:
    file: ${N8N_ENCRYPTION_KEY_FILE:?N8N_ENCRYPTION_KEY_FILE must be set}
  vault_deploy_key:
    file: ${VAULT_DEPLOY_KEY_FILE:?VAULT_DEPLOY_KEY_FILE must be set}
  github_known_hosts:
    file: ${GITHUB_KNOWN_HOSTS_FILE:?GITHUB_KNOWN_HOSTS_FILE must be set}

volumes:
  second-brain-local-n8n-data:
    name: second-brain-local-n8n-data
